<svg viewBox="0 0 700 970" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (REQUIRED) -->
  <rect width="700" height="970" fill="#f8f9fa" rx="10"/>

  <!-- Input -->
  <text x="350" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Input:</text>
  <rect x="150" y="45" width="400" height="48" fill="#ffffff" stroke="#dee2e6" stroke-width="2" rx="6"/>
  <text x="350" y="75" font-family="monospace" font-size="15" text-anchor="middle" fill="#2c3e50">"The cat sat on the"</text>

  <!-- Connector -->
  <path d="M 350,93 L 350,125" stroke="#3498db" stroke-width="2" fill="none"/>

  <!-- Step 1: Tokenization -->
  <rect x="50" y="125" width="600" height="100" fill="#e8f4f8" stroke="#3498db" stroke-width="2" rx="8"/>
  <text x="350" y="150" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#2c3e50">Step 1: Tokenization</text>

  <text x="80" y="178" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Tokens:</text>
  <text x="145" y="178" font-family="monospace" font-size="13" fill="#2c3e50">["The", "cat", "sat", "on", "the"]</text>

  <text x="80" y="205" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">IDs:</text>
  <text x="145" y="205" font-family="monospace" font-size="13" fill="#2c3e50">[2, 15, 7, 18, 2]</text>

  <!-- Connector -->
  <path d="M 350,225 L 350,260" stroke="#3498db" stroke-width="2" fill="none"/>

  <!-- Step 2: Embeddings -->
  <rect x="50" y="260" width="600" height="125" fill="#fff3cd" stroke="#f39c12" stroke-width="2" rx="8"/>
  <text x="350" y="287" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#2c3e50">Step 2: Embeddings</text>

  <text x="80" y="317" font-family="monospace" font-size="12" fill="#7f8c8d">Token 2 ("The")</text>
  <text x="215" y="317" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">→</text>
  <text x="235" y="317" font-family="monospace" font-size="12" fill="#2c3e50">[0.12, -0.33, 0.56, ..., 0.22]</text>
  <text x="510" y="317" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(768 numbers)</text>

  <text x="80" y="342" font-family="monospace" font-size="12" fill="#7f8c8d">Token 15 ("cat")</text>
  <text x="215" y="342" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">→</text>
  <text x="235" y="342" font-family="monospace" font-size="12" fill="#2c3e50">[0.23, -0.51, 0.82, ..., 0.15]</text>

  <text x="80" y="367" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#7f8c8d">[Same for all 5 tokens]</text>

  <!-- Connector -->
  <path d="M 350,385 L 350,420" stroke="#f39c12" stroke-width="2" fill="none"/>

  <!-- Step 3: Transformer Block 1 -->
  <rect x="50" y="420" width="600" height="125" fill="#e8daef" stroke="#9b59b6" stroke-width="2" rx="8"/>
  <text x="350" y="447" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#2c3e50">Step 3: Transformer Block 1</text>

  <text x="80" y="477" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">Attention:</text>
  <text x="165" y="477" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">"the" and "cat" relate (the specific cat)</text>

  <text x="80" y="502" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">Feed-Forward:</text>
  <text x="185" y="502" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">Refine each word's representation</text>

  <text x="80" y="527" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d">Output:</text>
  <text x="145" y="527" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">Updated vectors for all 5 tokens</text>

  <!-- Connector -->
  <path d="M 350,545 L 350,580" stroke="#9b59b6" stroke-width="2" fill="none"/>

  <!-- Step 4: Transformer Block 2 -->
  <rect x="50" y="580" width="600" height="125" fill="#e8daef" stroke="#9b59b6" stroke-width="2" rx="8"/>
  <text x="350" y="607" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#2c3e50">Step 4: Transformer Block 2</text>

  <text x="80" y="637" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">Attention:</text>
  <text x="165" y="637" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">"sat on the" indicates location coming</text>

  <text x="80" y="662" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">Feed-Forward:</text>
  <text x="185" y="662" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">Further refinement</text>

  <text x="80" y="687" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d">Output:</text>
  <text x="145" y="687" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">Even better representations</text>

  <!-- Connector with ellipsis -->
  <path d="M 350,705 L 350,735" stroke="#9b59b6" stroke-width="2" fill="none"/>
  <text x="350" y="755" font-family="Arial, sans-serif" font-size="13" font-style="italic" text-anchor="middle" fill="#7f8c8d">[Blocks 3-12 continue refining...]</text>
  <path d="M 350,765 L 350,795" stroke="#9b59b6" stroke-width="2" fill="none"/>

  <!-- Step 5: Prediction -->
  <rect x="50" y="795" width="600" height="165" fill="#d4edda" stroke="#27ae60" stroke-width="2" rx="8"/>
  <text x="350" y="822" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#2c3e50">Step 5: Prediction</text>

  <text x="80" y="852" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">Final representation for last position ("the") → Scores:</text>

  <!-- Score boxes -->
  <rect x="100" y="870" width="180" height="42" fill="#ffffff" stroke="#27ae60" stroke-width="1.5" rx="4"/>
  <text x="115" y="896" font-family="monospace" font-size="13" fill="#27ae60" font-weight="bold">"mat": 3.2</text>
  <text x="210" y="896" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ 0.45</text>

  <rect x="300" y="870" width="180" height="42" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" rx="4"/>
  <text x="315" y="896" font-family="monospace" font-size="13" fill="#2c3e50">"floor": 2.5</text>
  <text x="418" y="896" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ 0.25</text>

  <rect x="500" y="870" width="130" height="42" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" rx="4"/>
  <text x="515" y="896" font-family="monospace" font-size="13" fill="#2c3e50">"chair": 1.8</text>

  <text x="350" y="940" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#27ae60">Prediction: "mat"</text>
</svg>